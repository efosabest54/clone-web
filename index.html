<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleStatic</title>
    <link rel="stylesheet" href="index.css" />
</head>

<body>
    <nav>
        <div class="logo">
            <img src="logo-dark.svg" alt="logo" />
        </div>
        <ul class="sidebar">
            <li onclick=hideSidebar()><a href="#"></a><svg xmlns="http://www.w3.org/2000/svg" height="24px"
                    viewBox="0 -960 960 960" width="24px" fill="#1f1f1f">
                    <path
                        d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z" />
                </svg></li>
            <li><a href="#"></a>Product</li>
            <li><a href="#"></a>Pricing</li>
            <li><a href="#"></a>Learn</li>
            <li><a href="#"></a>Blog</li>
        </ul>
        <ul>
            <li class="hideOnMobile"><a href="#"></a>Product</li>
            <li class="hideOnMobile"><a href="#"></a>Pricing</li>
            <li class="hideOnMobile"><a href="#"></a>Learn</li>
            <li class="hideOnMobile"><a href="#"></a>Blog</li>
            <li class="hideMenu" onclick=showSidebar()><a href="#"></a><svg xmlns="http://www.w3.org/2000/svg" height="26px"
                    viewBox="0 -960 960 960" width="30px" fill="#1f1f1f">
                    <path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z" />
                </svg></li>
        </ul>
        <div class="nav-button">
            <p>Account</p>
            <button>Get Started</button>
        </div>
       
    </nav>

    <script>
        function showSidebar() {
            const sidebar = document.querySelector('.sidebar')
            sidebar.style.display = 'flex'
        }
        function hideSidebar() {
            const sidebar = document.querySelector('.sidebar')
            sidebar.style.display = 'none'
        }
    </script>
</body>

</html>
